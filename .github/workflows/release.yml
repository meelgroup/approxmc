name: release

on:
  push:
    tags:
      - 'release/v[0-9]+.[0-9]+.[0-9]+'

jobs:
  build:
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: true

      matrix:
        os: [ubuntu-latest, macos-15, ubuntu-24.04-arm, macos-15-intel]
        build_type: [Release]

    steps:
    - name: Install dependencies for Linux
      if: contains(matrix.os, 'ubuntu')
      run: sudo apt-get update && sudo apt-get install -yq help2man libgmp-dev libmpfr-dev

    - name: Install gmp for Mac
      if: contains(matrix.os, 'macos')
      run: |
        wget https://ftp.gnu.org/gnu/gmp/gmp-6.3.0.tar.xz
        tar xf gmp-6.3.0.tar.xz
        cd gmp-6.3.0
        ./configure --enable-static --enable-cxx --enable-shared --with-pic
        make -j8
        sudo make install
        cd ..

    - name: Install zlib for Mac static
      if: contains(matrix.os, 'macos')
      run: |
        wget https://zlib.net/fossils/zlib-1.3.1.tar.gz
        tar xzvf zlib-1.3.1.tar.gz
        cd zlib-1.3.1
        ./configure --static
        make -j8
        sudo make install
        cd ..

    - name: Install mpfr for Mac
      if: contains(matrix.os, 'macos')
      run: |
        wget https://ftp.gnu.org/gnu/mpfr/mpfr-4.2.1.tar.xz
        tar xf mpfr-4.2.1.tar.xz
        cd mpfr-4.2.1
        ./configure --enable-static --enable-cxx --enable-shared
        make -j8
        sudo make install
        cd ..

    - name: checkout
      uses: actions/checkout@v4
      with:
        path: project
        submodules: 'true'

    - name: Build project
      run: |
        cd project
        mkdir -p build && cd build
        cmake \
        -DENABLE_TESTING=OFF \
        -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} \
        -DBUILD_SHARED_LIBS=OFF \
        -S ..
        cmake --build . --config ${{ matrix.build_type }} -v

    - name: run it to check it executes
      run: |
        ./project/build/approxmc --version
        echo $?

    - name: Package artifacts
      run: |
        TAG="${{ github.ref_name }}"
        TAG="${TAG#release/}"
        if [[ "${{ matrix.os }}" == "ubuntu-latest" ]]; then
          ARCH="linux-amd64"
        elif [[ "${{ matrix.os }}" == "ubuntu-24.04-arm" ]]; then
          ARCH="linux-arm64"
        elif [[ "${{ matrix.os }}" == "macos-15" ]]; then
          ARCH="mac-arm64"
        elif [[ "${{ matrix.os }}" == "macos-15-intel" ]]; then
          ARCH="mac-x86_64"
        fi
        ARCHIVE="approxmc-${TAG}-${ARCH}.tar.gz"
        tar czf "${ARCHIVE}" \
          -C project/build \
          approxmc
        echo "ARCHIVE=${ARCHIVE}" >> $GITHUB_ENV

    - name: Upload release asset
      uses: actions/upload-artifact@v4
      with:
        name: ${{ env.ARCHIVE }}
        path: ${{ env.ARCHIVE }}

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Download all artifacts
      uses: actions/download-artifact@v4
      with:
        path: artifacts
        merge-multiple: true

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ github.ref_name }}
        name: ApproxMC ${{ github.ref_name }}
        generate_release_notes: true
        files: artifacts/*
